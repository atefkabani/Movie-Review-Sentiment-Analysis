<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 320" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Movie Review Sentiment Analysis">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="950" cy="160" r="260" fill="url(#glow)"/>

  <!-- Subtle film grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0"   y1="40"  x2="1200" y2="40"/>
    <line x1="0"   y1="280" x2="1200" y2="280"/>
  </g>

  <!-- Film reel (left) -->
  <g transform="translate(120,160)">
    <circle r="78" fill="none" stroke="url(#accent)" stroke-width="3"/>
    <circle r="14" fill="#a78bfa"/>
    <g fill="#22d3ee">
      <circle cx="0"   cy="-46" r="10"/>
      <circle cx="40"  cy="-23" r="10"/>
      <circle cx="40"  cy="23"  r="10"/>
      <circle cx="0"   cy="46"  r="10"/>
      <circle cx="-40" cy="23"  r="10"/>
      <circle cx="-40" cy="-23" r="10"/>
    </g>
  </g>

  <!-- Sentiment chip (right) -->
  <g transform="translate(1020,160)">
    <rect x="-110" y="-46" width="220" height="92" rx="46" fill="#0f172a" stroke="url(#accent)" stroke-width="2"/>
    <!-- Smile face -->
    <g transform="translate(-58,0)">
      <circle r="26" fill="none" stroke="#22d3ee" stroke-width="3"/>
      <circle cx="-9" cy="-6" r="3" fill="#22d3ee"/>
      <circle cx="9"  cy="-6" r="3" fill="#22d3ee"/>
      <path d="M -11 7 Q 0 17 11 7" fill="none" stroke="#22d3ee" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Frown face -->
    <g transform="translate(58,0)">
      <circle r="26" fill="none" stroke="#a78bfa" stroke-width="3"/>
      <circle cx="-9" cy="-6" r="3" fill="#a78bfa"/>
      <circle cx="9"  cy="-6" r="3" fill="#a78bfa"/>
      <path d="M -11 12 Q 0 2 11 12" fill="none" stroke="#a78bfa" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Divider -->
    <line x1="0" y1="-28" x2="0" y2="28" stroke="#334155" stroke-width="1"/>
  </g>

  <!-- Title block (center) -->
  <g text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
    <text x="600" y="120" fill="#ffffff" font-size="46" font-weight="700" letter-spacing="0.5">
      Movie Review Sentiment Analysis
    </text>
    <text x="600" y="166" fill="url(#accent)" font-size="20" font-weight="600" letter-spacing="3">
      GRU  •  TENSORFLOW  •  STREAMLIT
    </text>
    <text x="600" y="210" fill="#cbd5e1" font-size="18" font-weight="400">
      Deep learning that reads between the lines of a review.
    </text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="312" width="1200" height="8" fill="url(#accent)"/>
</svg>
